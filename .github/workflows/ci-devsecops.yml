name: CI/CD DevSecOps — TP07

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1 — LINT
  # hadolint (Dockerfile) + packer validate + ansible-lint
  # ═══════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint — Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Packer init & validate
        working-directory: packer
        run: |
          packer init ubuntu-cis.pkr.hcl
          packer validate ubuntu-cis.pkr.hcl

      - name: Installer ansible-lint
        run: pip install ansible-lint

      - name: Ansible-lint
        run: |
          cd packer/ansible
          ansible-lint playbook.yml

  # ═══════════════════════════════════════════════════════════
  # Job 2 — SAST
  # Bandit (Python) + Semgrep (multi-langage)
  # ═══════════════════════════════════════════════════════════
  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bandit — SAST Python
        run: |
          pip install bandit
          bandit -r scripts/ -ll -f txt

      - name: Semgrep — SAST multi-langage
        run: |
          pip install semgrep
          semgrep scan --config=auto --error . || true

  # ═══════════════════════════════════════════════════════════
  # Job 3 — BUILD
  # Packer build → image ubuntu-cis:latest → artifact
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build (Packer)
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Packer init & build
        working-directory: packer
        run: |
          packer init ubuntu-cis.pkr.hcl
          packer build ubuntu-cis.pkr.hcl

      - name: Exporter image en tar.gz
        run: docker save ubuntu-cis:latest | gzip > ubuntu-cis.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-cis-image
          path: ubuntu-cis.tar.gz
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # Job 4 — CVE SCAN (Trivy — bloquant sur CRITICAL/HIGH)
  # ═══════════════════════════════════════════════════════════
  cve-scan:
    name: CVE Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-cis-image

      - name: Charger l'image Docker
        run: docker load < ubuntu-cis.tar.gz

      - name: Trivy — scan CVE bloquant CRITICAL/HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ubuntu-cis:latest
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          format: table
          output: trivy-report.txt

      - name: Upload rapport Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt

  # ═══════════════════════════════════════════════════════════
  # Job 5 — DAST (ZAP Baseline)
  # Lance un conteneur nginx cible, puis ZAP baseline scan
  # ═══════════════════════════════════════════════════════════
  dast:
    name: DAST (ZAP Baseline)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Démarrer conteneur NGINX (cible DAST)
        run: |
          docker run -d --name dast-target -p 8080:80 nginx:alpine
          sleep 5
          curl -sf http://localhost:8080 > /dev/null && echo "Cible DAST prête"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8080"
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report

  # ═══════════════════════════════════════════════════════════
  # Job 6 — SIGN & PUSH
  # Cosign keyless (OIDC) + push Docker Hub
  # ═══════════════════════════════════════════════════════════
  sign-push:
    name: Sign & Push
    runs-on: ubuntu-latest
    needs: [cve-scan, dast]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-cis-image

      - name: Charger l'image Docker
        run: docker load < ubuntu-cis.tar.gz

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag et push vers Docker Hub
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/ubuntu-cis:latest"
          docker tag ubuntu-cis:latest "$IMAGE"
          docker push "$IMAGE"
          echo "IMAGE_REF=$IMAGE" >> "$GITHUB_ENV"

      - name: Installer Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign — signer l'image (keyless OIDC)
        run: cosign sign --yes "$IMAGE_REF"

      - name: Cosign — vérifier la signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/ci-devsecops.yml@refs/heads/main" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "$IMAGE_REF"
